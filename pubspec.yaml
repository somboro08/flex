name: flex_app
description: Flex - Réseau d'hébergement économique sécurisé en Afrique de l'Ouest
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State management
  provider: ^6.1.1
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  google_sign_in: ^6.1.6
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.6.0
  firebase_messaging: ^14.7.10
  
  # Paiement
  # cinetpay_flutter: ^1.0.0  # à activer après intégration
  
  # Navigation
  go_router: ^12.1.3
  
  # UI & Icons
  lucide_icons: ^0.257.0
  cached_network_image: ^3.3.1
  smooth_page_indicator: ^1.1.0
  shimmer: ^3.0.0
  
  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  
  # Utils
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  image_picker: ^1.0.7
  permission_handler: ^11.2.0
  url_launcher: ^6.2.4
  pdf: ^3.10.8
  printing: ^5.12.0
  path_provider: ^2.1.2
  
  # HTTP
  http: ^1.2.0
  dio: ^5.4.1
  flutter_svg: ^2.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: "^0.13.1"
  flutter_native_splash: "^2.3.11"

flutter:
  uses-material-design: true
  
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/launcher_icon.png"
  min_sdk_android: 21 # Votre minSdk version
  background_color: "#F2F0EC" # FlexColors.neutral100
  adaptive_icon_background: "#FF5722"  # Mets ici ton code couleur HEX (ex: Orange)
  adaptive_icon_foreground: "assets/launcher_icon.png" # Ton logo seul

flutter_native_splash:
  color: "#FF6B00" # FlexColors.primary500
  android: true
  ios: true
  android_gravity: center
  fullscreen: true
