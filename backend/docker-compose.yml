version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flex-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - SERVER_HOST=0.0.0.0
      - ENVIRONMENT=production
      - DATABASE_URL=postgres://flex:flex_password@postgres:5432/flex_db?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - flex-network

  postgres:
    image: postgres:16-alpine
    container_name: flex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: flex
      POSTGRES_PASSWORD: flex_password
      POSTGRES_DB: flex_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flex -d flex_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flex-network

  redis:
    image: redis:7-alpine
    container_name: flex-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - flex-network

volumes:
  postgres_data:
  redis_data:

networks:
  flex-network:
    driver: bridge
